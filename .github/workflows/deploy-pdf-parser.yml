name: Deploy PDF Parser

on:
  push:
    branches:
      - main
    paths:
      - "pdf_parser/**"
      - ".github/workflows/deploy-pdf-parser.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate deploy variables
        run: |
          test -n "${{ secrets.ECR_REPOSITORY }}" || (echo "Missing ECR_REPOSITORY" && exit 1)
          test -n "${{ secrets.LAMBDA_FUNCTION_NAME }}" || (echo "Missing LAMBDA_FUNCTION_NAME" && exit 1)
          test -n "${{ secrets.AWS_REGION }}" || (echo "Missing AWS_REGION" && exit 1)

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./pdf_parser/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Update Lambda function to new image
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --image-uri "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
